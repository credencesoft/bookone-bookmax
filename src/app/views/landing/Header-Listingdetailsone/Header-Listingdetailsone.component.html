<nav
  class="navbar navbar-dark top-navbar mobile-view-ui"

>
  <div
  class="container-div"
    style="display: flex; justify-content: space-between; align-items: center;"
  >
    <div >
            <button
        class="navbar-toggler"
        *ngIf="businessUser?.website"

      </button>
    </div>

    <div>
              <button
        class="blinking-unique-btn"
        (click)="scrollToAccommodation($event)"
      >
        Book Now
      </button>
    </div>
  </div>
