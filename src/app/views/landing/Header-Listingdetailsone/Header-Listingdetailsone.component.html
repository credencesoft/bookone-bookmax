<!-- Vertical Navbar -->
<div class="vertical-nav" id="sidebar" *ngIf="isdone">
  <div>
    <button class="close-btn" (click)="closeNavbar()">
      <img src="/assets/images/x-mark.png" alt="Close" />
    </button>
  </div>

  <ul class="nav-menu">
    <li class="nav-item">
      <img
        *ngIf="businessUser?.logoUrl"
        [src]="businessUser?.logoUrl"
        alt="Logo"
        class="logo-imagetwo"
      />
      <a
        *ngIf="businessUser?.website"
        [href]="this.website"
        target="_top"
        class="nav-link"
      >
        <i class="fas fa-home"></i> Home
      </a>
    </li>
    <hr *ngIf="businessUser?.website" />

    <li class="nav-item">
      <a
        *ngIf="businessUser?.website && socialmedialist?.aboutUs"
        [href]="socialmedialist?.aboutUs"
        target="_top"
        class="nav-link"
      >
        <i class="fas fa-info-circle"></i> About Us
      </a>
    </li>
    <hr *ngIf="businessUser?.website && socialmedialist?.aboutUs" />
    <li class="nav-item">
      <a
        *ngIf="businessUser?.website && socialmedialist?.blogPageUrl"
        [href]="socialmedialist?.blogPageUrl"
        target="_top"
        class="nav-link"
      >
        <i class="fas fa-info-circle"></i> Blogs
      </a>
    </li>
    <hr *ngIf="businessUser?.website && socialmedialist?.blogPageUrl" />
    <li class="nav-item">
      <a
        *ngIf="businessUser?.website && socialmedialist?.csr"
        [href]="socialmedialist?.csr"
        target="_top"
        class="nav-link"
      >
        <i class="fas fa-info-circle"></i> CSR
      </a>
    </li>
    <hr *ngIf="businessUser?.website && socialmedialist?.csr" />
    <li class="nav-item">
      <a
        *ngIf="businessUser?.website && socialmedialist?.contact"
        [href]="socialmedialist?.contact"
        target="_top"
        class="nav-link"
      >
        <i class="fas fa-info-circle"></i> Contact
      </a>
    </li>
    <hr *ngIf="businessUser?.website && socialmedialist?.contact" />

    <li class="nav-item">
      <a
        *ngIf="businessUser?.website && socialmedialist?.termsAndConditions"
        href="{{ socialmedialist?.termsAndConditions }}"
        class="nav-link"
      >
        <i class="fas fa-file-contract"></i> Terms & Conditions
      </a>
    </li>
    <hr *ngIf="businessUser?.website && socialmedialist?.termsAndConditions" />

    <li class="nav-item">
      <a
        *ngIf="businessUser?.website && socialmedialist?.privacyPolicy"
        href="{{ socialmedialist?.privacyPolicy }}"
        class="nav-link"
      >
        <i class="fas fa-user-secret"></i> Privacy Policy
      </a>
    </li>
    <hr *ngIf="businessUser?.website && socialmedialist?.privacyPolicy" />

    <li class="nav-item">
      <a
        *ngIf="businessUser?.website && socialmedialist?.paymentTerms"
        href="{{ socialmedialist?.paymentTerms }}"
        class="nav-link"
      >
        <i class="fas fa-credit-card"></i> Payment Terms
      </a>
    </li>
    <hr *ngIf="businessUser?.website && socialmedialist?.paymentTerms" />
  </ul>
</div>

<nav

    <div class="header-section-content">
      <div>
        <a

          target="_top"
          style="color: white"
          >Home</a
        >
      </div>
      <div>
        <a
          *ngIf="businessUser?.website && socialmedialist?.aboutUs"
          [href]="socialmedialist?.aboutUs"
          target="_top"
          style="color: white"
          >About Us</a
        >
      </div>
      <div>
        <a
          *ngIf="businessUser?.website && socialmedialist?.blogPageUrl"
          [href]="socialmedialist?.blogPageUrl"
          target="_top"
          style="color: white"
          >Blogs</a
        >
      </div>
      <div>
        <a
          *ngIf="businessUser?.website && socialmedialist?.csr"
          [href]="socialmedialist?.csr"
          target="_top"
          style="color: white"
          >CSR</a
        >
      </div>
      <div>
        <a
          *ngIf="businessUser?.website && socialmedialist?.contact"
          [href]="socialmedialist?.contact"
          target="_top"
          style="color: white"
          >Contact</a
        >
      </div>
      <div>
        <a
          *ngIf="businessUser?.website && socialmedialist?.termsAndConditions"
          [href]="socialmedialist?.termsAndConditions"
          target="_top"
          style="color: white"
          >Terms & Conditions</a
        >
      </div>
      <div>
        <a
          *ngIf="businessUser?.website && socialmedialist?.privacyPolicy"
          [href]="socialmedialist?.privacyPolicy"
          target="_top"
          style="color: white"
          >Privacy Policy</a
        >
      </div>
      <div>
        <a
          *ngIf="businessUser?.website && socialmedialist?.paymentTerms"
          [href]="socialmedialist?.paymentTerms"
          target="_top"
          style="color: white"
          >Payment Terms</a
        >
      </div>
    </div>

    <!-- Right Section: Book Now Button -->
    <div style="margin-left: auto">
      <button
        class="blinking-unique-btn"
        (click)="scrollToAccommodation($event)"
        style="
          background-color: #fff;
          color: black !important;
          border: none;
          padding: 6px 22px;
        "
      >
        Book Now
      </button>
    </div>
  </div>
</nav>

<nav
  class="navbar navbar-dark top-navbar mobile-view-ui"
  *ngIf="showheader === true"
>
  <div
    class="container-div"
    style="display: flex; justify-content: space-between; align-items: center"
  >
    <!-- Left Section: Always rendered -->
    <div
      class="left-section"
      style="
        min-width: 80px;
        min-height: 60px;
        display: flex;
        align-items: center;
      "
    >
      <img
        *ngIf="businessUser?.logoUrl"
        class="logo-image"
        [src]="businessUser.logoUrl"
        alt="Business Logo"
        style="height: 50px"
      />
    </div>

    <!-- Right Section: Always visible (if businessUser?.website exists) -->
    <div style="display: flex; gap: 7px">
      <button
        class="navbar-toggler"
        *ngIf="businessUser?.website"
        (click)="toggleListingDetails()"
        type="button"
        aria-controls="navbarToggleExternalContent"
        aria-expanded="false"
        aria-label="Toggle navigation"
      >
        <img src="assets/images/nav-toggle.png" alt="Toggle Navigation" />
      </button>
    </div>
  </div>
</nav>
